name: CI - TechBridge Eureka
on:
  push:
    branches:
      - develop
      - release-*

jobs:
  ci:
    name: build and test
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: ✅ Run Unit Test & Integration Test & Functional Test
        run: mvn -B verify